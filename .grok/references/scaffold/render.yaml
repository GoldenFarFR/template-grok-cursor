services:
  - type: web
    name: __SITE_SLUG__
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_DEXPULSE_API_URL
        value: https://dexpulse-m3bp.onrender.com/api
      - key: VITE_PRIVY_APP_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html